        <h1><a href="../index.html">Asad Husain</a></h1>

            </ul>
        </nav>
    </header>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            fetch('../left-panel.html')
                .then(response => response.text())
                .then(data => {
                    const adjustedData = data.replace(/src="images\//g, 'src="../images/');
                    document.querySelector('.left-panel-container').innerHTML = adjustedData;
                });

            const currentPath = window.location.pathname.split('/').pop();
            const navLinks = document.querySelectorAll('nav ul li a');

            navLinks.forEach(link => {
                const linkPath = link.getAttribute('href').split('/').pop();
                if (linkPath === currentPath) {
                    link.classList.add('nav-active');
                }
            });

            const hamburgerMenu = document.querySelector('.hamburger-menu');
            const nav = document.querySelector('nav');

            hamburgerMenu.addEventListener('click', () => {
                nav.classList.toggle('active');
            });
        });
    </script>
    <main>
        <div class="left-panel-container"></div>
        <div class="right-panel">
            <h2>Work</h2>
            <div id="work-container"></div>
        </div>
    </main>
